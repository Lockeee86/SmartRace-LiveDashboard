<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartRace TV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/tv.css') }}" rel="stylesheet">
</head>
<body class="tv-mode">

<div class="tv-wrapper">
    <!-- Header -->
    <div class="tv-header">
        <span class="tv-brand"><i class="fas fa-flag-checkered me-2"></i>SmartRace</span>
        <div class="tv-race-info">
            <span class="tv-status-badge bg-secondary" id="tvStatusBadge">Warte...</span>
            <span id="tvRaceType"></span>
            <span class="tv-countdown d-none" id="tvCountdown">--:--</span>
            <span id="tvLapProgress" class="d-none"></span>
        </div>
        <div class="tv-nav">
            <div class="tv-nav-dot active" data-view="0" title="Leaderboard"></div>
            <div class="tv-nav-dot" data-view="1" title="Strecke"></div>
            <div class="tv-nav-dot" data-view="2" title="Statistiken"></div>
            <span class="tv-pause-indicator d-none" id="tvPauseIndicator"><i class="fas fa-pause"></i> PAUSE</span>
        </div>
    </div>

    <!-- VSC Banner -->
    <div class="tv-vsc-banner d-none" id="tvVscBanner">
        <i class="fas fa-shield-halved me-2"></i>VIRTUAL SAFETY CAR<i class="fas fa-shield-halved ms-2"></i>
    </div>

    <!-- Views -->
    <div class="tv-viewport">
        <!-- View 0: Leaderboard -->
        <div class="tv-view active" id="tvView0">
            <table class="tv-leaderboard">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th style="text-align:left">Fahrer</th>
                        <th>Runden</th>
                        <th>Bestzeit</th>
                        <th>Letzte</th>
                        <th>Tank</th>
                        <th>Abstand</th>
                    </tr>
                </thead>
                <tbody id="tvLeaderboardBody"></tbody>
            </table>
        </div>

        <!-- View 1: Track Map -->
        <div class="tv-view" id="tvView1">
            <div class="tv-track-container" id="tvTrackContainer">
                <span class="text-muted" style="font-size:1.5rem;">Kein Streckenlayout verfuegbar</span>
            </div>
        </div>

        <!-- View 2: Stats -->
        <div class="tv-view" id="tvView2">
            <div class="tv-stats-grid" id="tvStatsGrid">
                <div class="tv-stat-card">
                    <div class="tv-stat-label"><i class="fas fa-bolt me-1"></i>Schnellste Runde</div>
                    <div class="tv-stat-value" id="tvFastestTime">--:--.---</div>
                    <div class="tv-stat-sub" id="tvFastestDriver">--</div>
                </div>
                <div class="tv-stat-card">
                    <div class="tv-stat-label"><i class="fas fa-trophy me-1"></i>Streckenrekord</div>
                    <div class="tv-stat-value" id="tvRecordTime">--:--.---</div>
                    <div class="tv-stat-sub" id="tvRecordDriver">--</div>
                </div>
                <div class="tv-stat-card">
                    <div class="tv-stat-label"><i class="fas fa-users me-1"></i>Session</div>
                    <div class="tv-stat-value" id="tvTotalLaps">0</div>
                    <div class="tv-stat-sub">Runden gesamt</div>
                </div>
                <div class="tv-stat-card" style="grid-column: span 3;">
                    <div class="tv-stat-label"><i class="fas fa-chart-bar me-1"></i>Sektorenanalyse</div>
                    <div id="tvSectorAnalysis" style="margin-top:0.5rem;">
                        <span class="text-muted">Keine Sektordaten</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='js/track-positions.js') }}"></script>
<script>
// ---- Helpers ----
function formatTime(timeMs) {
    if (!timeMs || timeMs <= 0) return '--:--.---';
    const minutes = Math.floor(timeMs / 60000);
    const seconds = ((timeMs % 60000) / 1000).toFixed(3);
    return minutes + ':' + seconds.padStart(6, '0');
}

const CONTROLLER_COLORS = {
    '1': '#e74c3c', '2': '#3498db', '3': '#2ecc71',
    '4': '#f1c40f', '5': '#e67e22', '6': '#9b59b6',
};
function getControllerColor(id) { return CONTROLLER_COLORS[String(id)] || '#95a5a6'; }

// ---- State ----
let tvData = {};
let tvFuel = {};
let tvTrackRecord = null;
let tvRaceDuration = 0;
let tvRaceMaxLaps = 0;
let tvCountdownStart = null;
let tvCountdownInterval = null;
let tvTrackMap = null;

// ---- WebSocket ----
const socket = io({ reconnection: true, reconnectionAttempts: 10 });

// ---- View Rotation ----
const VIEWS = [document.getElementById('tvView0'), document.getElementById('tvView1'), document.getElementById('tvView2')];
const DOTS = document.querySelectorAll('.tv-nav-dot');
let currentView = 0;
let rotationInterval = null;
let rotationPaused = false;
const ROTATION_DELAY = 20000;

function showView(idx) {
    currentView = idx;
    VIEWS.forEach((v, i) => v.classList.toggle('active', i === idx));
    DOTS.forEach((d, i) => d.classList.toggle('active', i === idx));
}

function nextView() {
    showView((currentView + 1) % VIEWS.length);
}

function startRotation() {
    stopRotation();
    rotationPaused = false;
    document.getElementById('tvPauseIndicator').classList.add('d-none');
    rotationInterval = setInterval(nextView, ROTATION_DELAY);
}

function stopRotation() {
    if (rotationInterval) { clearInterval(rotationInterval); rotationInterval = null; }
}

function togglePause() {
    if (rotationPaused) {
        startRotation();
    } else {
        stopRotation();
        rotationPaused = true;
        document.getElementById('tvPauseIndicator').classList.remove('d-none');
    }
}

DOTS.forEach(d => d.addEventListener('click', () => {
    showView(parseInt(d.dataset.view));
    stopRotation();
    rotationPaused = true;
    document.getElementById('tvPauseIndicator').classList.remove('d-none');
}));

document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { nextView(); stopRotation(); rotationPaused = true; document.getElementById('tvPauseIndicator').classList.remove('d-none'); }
    else if (e.key === 'ArrowLeft') { showView((currentView - 1 + VIEWS.length) % VIEWS.length); stopRotation(); rotationPaused = true; document.getElementById('tvPauseIndicator').classList.remove('d-none'); }
    else if (e.key === ' ') { e.preventDefault(); togglePause(); }
});

startRotation();

// ---- Data Fetching ----
async function fetchData() {
    try {
        const res = await fetch('/api/live-data');
        if (!res.ok) return;
        tvData = await res.json();
        renderAll();
    } catch (e) {}
}

async function fetchTrackRecord() {
    try {
        const res = await fetch('/api/track-record');
        if (!res.ok) return;
        const rec = await res.json();
        if (rec && rec.laptime_ms) {
            tvTrackRecord = rec;
            document.getElementById('tvRecordTime').textContent = rec.laptime_formatted || formatTime(rec.laptime_ms);
            document.getElementById('tvRecordDriver').textContent = rec.driver_name;
        }
    } catch (e) {}
}

async function fetchTrackLayout() {
    try {
        const res = await fetch('/api/active-track-layout');
        if (!res.ok) return;
        const data = await res.json();
        const container = document.getElementById('tvTrackContainer');
        if (data.svg_layout) {
            container.innerHTML = data.svg_layout;
            const svg = container.querySelector('svg');
            if (svg) { svg.style.maxWidth = '90%'; svg.style.maxHeight = '90%'; }
            if (tvTrackMap) tvTrackMap.destroy();
            tvTrackMap = new TrackPositionMap('tvTrackContainer', () => tvData);
            tvTrackMap.init();
        }
    } catch (e) {}
}

// ---- Rendering ----
function renderAll() {
    renderLeaderboard();
    renderStats();
    renderSectors();
}

function renderLeaderboard() {
    const drivers = [];
    let fastest = null;

    Object.entries(tvData).forEach(([cid, cd]) => {
        if (!cd.laps || cd.laps.length === 0) return;
        const lapNums = cd.laps.map(l => l.lap || 0).filter(n => n > 0);
        const maxLap = lapNums.length > 0 ? Math.max(...lapNums) : 0;
        const color = (cd.color && cd.color !== '#333333') ? cd.color : getControllerColor(cid);
        const sorted = [...cd.laps].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        const lastLap = sorted[0] || {};

        drivers.push({
            cid, name: cd.name || 'Fahrer ' + cid, color,
            totalLaps: maxLap,
            bestTime: cd.best_time_raw,
            lastTime: lastLap.laptime_raw || null,
            fuel: tvFuel[cid] !== undefined ? tvFuel[cid] : -1,
            retired: cd.retired || false,
            disqualified: cd.disqualified || false,
        });

        if (cd.best_time_raw && (!fastest || cd.best_time_raw < fastest.time)) {
            fastest = { time: cd.best_time_raw, driver: cd.name || 'Fahrer ' + cid };
        }
    });

    drivers.sort((a, b) => {
        if (a.disqualified !== b.disqualified) return a.disqualified ? 1 : -1;
        if (a.retired !== b.retired) return a.retired ? 1 : -1;
        if (a.totalLaps !== b.totalLaps) return b.totalLaps - a.totalLaps;
        if (a.bestTime && b.bestTime) return a.bestTime - b.bestTime;
        return 0;
    });

    const leader = drivers[0];
    const tbody = document.getElementById('tvLeaderboardBody');

    tbody.innerHTML = drivers.map((d, i) => {
        const pos = i + 1;
        const posClass = pos === 1 ? 'tv-pos-1' : pos === 2 ? 'tv-pos-2' : pos === 3 ? 'tv-pos-3' : '';

        let gap = '';
        if (d.disqualified) gap = '<span style="color:#e74c3c">DQ</span>';
        else if (d.retired) gap = '<span style="color:#f1c40f">DNF</span>';
        else if (d === leader) gap = '';
        else if (d.totalLaps < leader.totalLaps) {
            const diff = leader.totalLaps - d.totalLaps;
            gap = '+' + diff + ' Rd.';
        } else if (d.bestTime && leader.bestTime) {
            gap = '+' + formatTime(d.bestTime - leader.bestTime);
        }

        const isFastest = fastest && d.bestTime === fastest.time;

        let fuelHtml = '';
        if (d.fuel >= 0) {
            const fc = d.fuel > 50 ? '#2ecc71' : d.fuel > 20 ? '#f1c40f' : '#e74c3c';
            fuelHtml = `<div class="tv-fuel-bar"><div class="tv-fuel-fill" style="width:${d.fuel}%;background:${fc}"></div></div>`;
        }

        return `<tr class="tv-row" data-cid="${d.cid}" style="border-left:4px solid ${d.color}">
            <td class="tv-pos ${posClass}">${pos}</td>
            <td class="tv-driver" style="color:${d.color}">${d.name}</td>
            <td class="tv-laps">${d.totalLaps}</td>
            <td class="tv-time">${formatTime(d.bestTime)}${isFastest ? ' <i class="fas fa-bolt tv-fastest-badge"></i>' : ''}</td>
            <td class="tv-time" style="opacity:0.7">${formatTime(d.lastTime)}</td>
            <td>${fuelHtml}</td>
            <td class="tv-gap">${gap}</td>
        </tr>`;
    }).join('');

    if (fastest) {
        document.getElementById('tvFastestTime').textContent = formatTime(fastest.time);
        document.getElementById('tvFastestDriver').textContent = fastest.driver;
    }
}

function renderStats() {
    let totalLaps = 0;
    Object.values(tvData).forEach(cd => { totalLaps += (cd.laps || []).length; });
    document.getElementById('tvTotalLaps').textContent = totalLaps;
}

function parseSectorMs(val) {
    if (!val) return null;
    const s = String(val).trim();
    if (s.includes(':')) {
        const [minPart, secPart] = s.split(':');
        const mins = parseInt(minPart, 10) || 0;
        const secs = parseFloat(secPart.replace(',', '.'));
        if (isNaN(secs)) return null;
        return (mins * 60 + secs) * 1000;
    }
    const num = parseFloat(s.replace(',', '.'));
    return isNaN(num) || num === 0 ? null : num * 1000;
}

function renderSectors() {
    const container = document.getElementById('tvSectorAnalysis');
    const driverSectors = [];
    Object.entries(tvData).forEach(([cid, cd]) => {
        const s1 = [], s2 = [], s3 = [];
        (cd.laps || []).forEach(l => {
            const v1 = parseSectorMs(l.sector_1), v2 = parseSectorMs(l.sector_2), v3 = parseSectorMs(l.sector_3);
            if (v1) s1.push(v1); if (v2) s2.push(v2); if (v3) s3.push(v3);
        });
        if (!s1.length && !s2.length && !s3.length) return;
        const best = arr => arr.length ? Math.min(...arr) : null;
        const color = (cd.color && cd.color !== '#333333') ? cd.color : getControllerColor(cid);
        driverSectors.push({ name: cd.name || 'Fahrer ' + cid, color, bestS1: best(s1), bestS2: best(s2), bestS3: best(s3) });
    });

    if (!driverSectors.length) { container.innerHTML = '<span class="text-muted">Keine Sektordaten</span>'; return; }

    const gb1 = Math.min(...driverSectors.map(d => d.bestS1).filter(Boolean));
    const gb2 = Math.min(...driverSectors.map(d => d.bestS2).filter(Boolean));
    const gb3 = Math.min(...driverSectors.map(d => d.bestS3).filter(Boolean));
    const fmt = ms => ms ? (ms / 1000).toFixed(3) : '--';

    let html = '<table class="tv-sector-table"><thead><tr><th>Fahrer</th><th>S1</th><th>S2</th><th>S3</th></tr></thead><tbody>';
    driverSectors.forEach(d => {
        const b1 = d.bestS1 === gb1 ? ' sector-best' : '';
        const b2 = d.bestS2 === gb2 ? ' sector-best' : '';
        const b3 = d.bestS3 === gb3 ? ' sector-best' : '';
        html += `<tr><td style="color:${d.color};font-weight:700">${d.name}</td><td class="${b1}">${fmt(d.bestS1)}</td><td class="${b2}">${fmt(d.bestS2)}</td><td class="${b3}">${fmt(d.bestS3)}</td></tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

// ---- Status ----
const STATUS_MAP = {
    'prepare_for_start': { text: 'START', cls: 'bg-info' },
    'starting': { text: 'START', cls: 'bg-info' },
    'running': { text: 'RENNEN', cls: 'bg-success' },
    'racing': { text: 'RENNEN', cls: 'bg-success' },
    'started': { text: 'RENNEN', cls: 'bg-success' },
    'suspended': { text: 'PAUSE', cls: 'bg-warning' },
    'paused': { text: 'PAUSE', cls: 'bg-warning' },
    'ended': { text: 'ENDE', cls: 'bg-secondary' },
    'finished': { text: 'ENDE', cls: 'bg-secondary' },
};

function updateStatus(status, raceType) {
    const badge = document.getElementById('tvStatusBadge');
    const s = STATUS_MAP[status] || { text: status || 'Warte...', cls: 'bg-secondary' };
    badge.className = 'tv-status-badge ' + s.cls;
    badge.textContent = s.text;
    if (raceType) document.getElementById('tvRaceType').textContent = raceType === 'race' ? 'Rennen' : raceType;
}

// ---- Countdown ----
function startTvCountdown() {
    stopTvCountdown();
    tvCountdownStart = Date.now();
    const el = document.getElementById('tvCountdown');
    el.classList.remove('d-none');
    tvCountdownInterval = setInterval(() => {
        if (!tvCountdownStart || tvRaceDuration <= 0) { stopTvCountdown(); return; }
        const remaining = Math.max(0, tvRaceDuration - (Date.now() - tvCountdownStart) / 1000);
        const m = Math.floor(remaining / 60), s = Math.floor(remaining % 60);
        el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        el.classList.toggle('critical', remaining <= 60);
        if (remaining <= 0) { el.textContent = 'ZEIT!'; stopTvCountdown(); }
    }, 500);
}

function stopTvCountdown() {
    if (tvCountdownInterval) { clearInterval(tvCountdownInterval); tvCountdownInterval = null; }
}

// ---- WebSocket Events ----
socket.on('new_data', (data) => {
    if (data.lap && data.event_type === 'ui.lap_update') {
        const lap = data.lap;
        const cid = lap.controller_id;
        if (!tvData[cid]) {
            tvData[cid] = { name: lap.driver_name, car: lap.car_name, color: lap.color || getControllerColor(cid), laps: [], best_time_raw: null, penalties: 0, retired: false, disqualified: false };
        }
        tvData[cid].laps.push({
            lap: lap.lap_number || 0, laptime_raw: lap.laptime_ms || 0,
            laptime_formatted: lap.laptime_formatted, timestamp: lap.timestamp,
            is_pb: lap.is_pb, sector_1: lap.sector_1, sector_2: lap.sector_2, sector_3: lap.sector_3,
        });
        if (lap.laptime_ms > 0) {
            const best = tvData[cid].best_time_raw;
            if (!best || lap.laptime_ms < best) tvData[cid].best_time_raw = lap.laptime_ms;
        }
        renderAll();
        if (tvRaceMaxLaps > 0) {
            let maxLap = 0;
            Object.values(tvData).forEach(cd => {
                const nums = (cd.laps || []).map(l => l.lap || 0);
                if (nums.length) maxLap = Math.max(maxLap, ...nums);
            });
            const el = document.getElementById('tvLapProgress');
            el.classList.remove('d-none');
            el.textContent = `${maxLap}/${tvRaceMaxLaps}`;
        }
    } else {
        fetchData();
    }
});

socket.on('race_status', (data) => {
    updateStatus(data.status, data.race_type);
    if (data.laps) tvRaceMaxLaps = parseInt(data.laps) || 0;
    if (data.duration) tvRaceDuration = parseInt(data.duration) || 0;
    if (tvRaceDuration > 0 && (data.status === 'running' || data.status === 'started')) {
        startTvCountdown();
    } else if (data.status === 'ended' || data.status === 'finished') {
        stopTvCountdown();
    } else if (data.status === 'suspended') {
        stopTvCountdown();
    }
});

socket.on('track_record', (data) => {
    if (data && data.laptime_ms) {
        tvTrackRecord = data;
        document.getElementById('tvRecordTime').textContent = data.laptime_formatted || formatTime(data.laptime_ms);
        document.getElementById('tvRecordDriver').textContent = data.driver_name;
    }
});

socket.on('fuel_update', (data) => {
    if (data.controller_id !== undefined && data.fuel !== undefined) {
        const cid = String(data.controller_id);
        if (data.fuel < 0) delete tvFuel[cid]; else tvFuel[cid] = data.fuel;
        renderLeaderboard();
    }
});

socket.on('vsc', (data) => {
    document.getElementById('tvVscBanner').classList.toggle('d-none', !data.active);
});

socket.on('active_track', () => fetchTrackLayout());

// ---- Initial Load ----
fetch('/api/race-status').then(r => r.ok ? r.json() : null).then(data => {
    if (data) updateStatus(data.status, data.race_type);
}).catch(() => {});

fetchData();
fetchTrackRecord();
fetchTrackLayout();
setInterval(fetchData, 15000);

// Auto-fullscreen on load
document.addEventListener('click', function autoFs() {
    document.documentElement.requestFullscreen?.();
    document.removeEventListener('click', autoFs);
}, { once: true });
</script>
</body>
</html>
